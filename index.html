<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maison Alva | Premium Referenzseite im Apple-Look</title>

  <style>
    :root {
      --bg: #f5f5f7;
      --white: #ffffff;
      --black: #0b0b0f;
      --text: #151519;
      --muted: #707075;
      --muted-2: #9b9ba1;
      --line: rgba(0, 0, 0, 0.08);
      --blue: #0071e3;
      --blue-dark: #005bbf;
      --silver: #e8e8ed;
      --glass: rgba(255, 255, 255, 0.68);
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.12);
      --shadow-soft: 0 18px 48px rgba(0, 0, 0, 0.075);
      --radius-xl: 42px;
      --radius-lg: 30px;
      --radius-md: 20px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .demo-badge {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(15, 15, 18, 0.82);
      color: #ffffff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 650;
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .nav-wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(245, 245, 247, 0.78);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
    }

    .nav {
      width: min(var(--max), calc(100% - 36px));
      height: 64px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 760;
      letter-spacing: -0.04em;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(145deg, #101014 0%, #3f3f46 100%);
      color: #ffffff;
      display: grid;
      place-items: center;
      font-size: 15px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      color: rgba(16, 16, 20, 0.72);
      font-size: 13px;
      font-weight: 650;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 16px;
      border-radius: 999px;
      background: var(--blue);
      color: #ffffff;
      font-size: 13px;
      font-weight: 720;
      box-shadow: 0 10px 24px rgba(0, 113, 227, 0.24);
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    }

    .nav-cta:hover,
    .button-primary:hover,
    .button-secondary:hover {
      transform: translateY(-2px);
    }

    .nav-cta:hover,
    .button-primary:hover {
      background: var(--blue-dark);
      box-shadow: 0 18px 34px rgba(0, 113, 227, 0.28);
    }

    .hero {
      position: relative;
      min-height: 100vh;
      padding: 124px 0 70px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 24%, rgba(0, 113, 227, 0.18) 0%, rgba(0, 113, 227, 0.07) 28%, rgba(245, 245, 247, 0) 58%),
        linear-gradient(180deg, #ffffff 0%, #f5f5f7 74%);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 62%);
      opacity: 0.45;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      width: min(var(--max), calc(100% - 36px));
      margin: 0 auto;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      width: fit-content;
      margin: 0 auto 22px;
      color: rgba(16, 16, 20, 0.72);
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 720;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    h1 {
      max-width: 1030px;
      margin: 0 auto 24px;
      font-size: clamp(54px, 8vw, 122px);
      line-height: 0.88;
      letter-spacing: -0.09em;
      font-weight: 840;
    }

    .gradient-text {
      background: linear-gradient(100deg, #111114 0%, #4e4e55 35%, #0071e3 68%, #8e6df8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-text {
      max-width: 760px;
      margin: 0 auto 34px;
      color: var(--muted);
      font-size: clamp(19px, 2.2vw, 26px);
      line-height: 1.32;
      letter-spacing: -0.035em;
      font-weight: 540;
    }

    .hero-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 13px;
      margin-bottom: 58px;
    }

    .button-primary,
    .button-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 23px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 730;
      letter-spacing: -0.02em;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    }

    .button-primary {
      background: var(--blue);
      color: #ffffff;
      box-shadow: 0 14px 34px rgba(0, 113, 227, 0.24);
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.78);
      color: var(--blue);
      border: 1px solid rgba(0, 113, 227, 0.12);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .hero-stage {
      position: relative;
      width: min(1100px, 100%);
      margin: 0 auto;
      min-height: 570px;
      display: grid;
      place-items: center;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(2px);
      opacity: 0.9;
      pointer-events: none;
    }

    .orb.one {
      width: 220px;
      height: 220px;
      left: 3%;
      top: 12%;
      background: radial-gradient(circle at 35% 35%, #ffffff, #b8dcff 42%, rgba(0, 113, 227, 0.1) 72%);
      box-shadow: 0 30px 90px rgba(0, 113, 227, 0.18);
    }

    .orb.two {
      width: 170px;
      height: 170px;
      right: 6%;
      top: 2%;
      background: radial-gradient(circle at 35% 35%, #ffffff, #ded2ff 42%, rgba(142, 109, 248, 0.08) 72%);
      box-shadow: 0 30px 90px rgba(142, 109, 248, 0.15);
    }

    .orb.three {
      width: 145px;
      height: 145px;
      right: 14%;
      bottom: 8%;
      background: radial-gradient(circle at 35% 35%, #ffffff, #d8efe8 42%, rgba(103, 214, 179, 0.1) 72%);
      box-shadow: 0 30px 90px rgba(103, 214, 179, 0.13);
    }

    .premium-card {
      position: relative;
      z-index: 2;
      width: min(830px, calc(100% - 28px));
      min-height: 520px;
      border-radius: 48px;
      background: linear-gradient(145deg, rgba(255,255,255,0.92), rgba(255,255,255,0.52));
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      overflow: hidden;
      padding: 18px;
    }

    .premium-card::before {
      content: "";
      position: absolute;
      width: 380px;
      height: 380px;
      left: 50%;
      top: -180px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0, 113, 227, 0.24), rgba(142, 109, 248, 0.12) 42%, rgba(255,255,255,0) 70%);
      pointer-events: none;
    }

    .premium-screen {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 484px;
      border-radius: 34px;
      background: #101014;
      color: #ffffff;
      padding: 30px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.09);
    }

    .screen-top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      margin-bottom: 38px;
    }

    .traffic {
      display: flex;
      gap: 8px;
    }

    .traffic span {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.24);
    }

    .screen-label {
      color: rgba(255, 255, 255, 0.55);
      font-size: 13px;
      font-weight: 650;
    }

    .screen-main {
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 26px;
      align-items: center;
    }

    .screen-copy h2 {
      font-size: clamp(34px, 4vw, 58px);
      line-height: 0.94;
      letter-spacing: -0.065em;
      margin-bottom: 16px;
    }

    .screen-copy p {
      color: rgba(255,255,255,0.64);
      font-size: 16px;
      letter-spacing: -0.025em;
      max-width: 360px;
    }

    .screen-visual {
      min-height: 280px;
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 24%, rgba(0,113,227,0.42), rgba(142,109,248,0.22) 38%, rgba(255,255,255,0.02) 68%),
        linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.10);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .screen-visual::before,
    .screen-visual::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .screen-visual::before {
      width: 280px;
      height: 280px;
    }

    .screen-visual::after {
      width: 190px;
      height: 190px;
    }

    .monogram {
      position: relative;
      z-index: 1;
      width: 128px;
      height: 128px;
      border-radius: 36px;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.16);
      display: grid;
      place-items: center;
      font-size: 54px;
      font-weight: 780;
      letter-spacing: -0.08em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 24px 70px rgba(0,0,0,0.22);
    }

    .screen-bottom {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 28px;
    }

    .screen-stat {
      min-height: 82px;
      border-radius: 22px;
      background: rgba(255,255,255,0.075);
      border: 1px solid rgba(255,255,255,0.09);
      padding: 16px;
      text-align: left;
    }

    .screen-stat strong {
      display: block;
      font-size: 24px;
      letter-spacing: -0.05em;
      margin-bottom: 3px;
    }

    .screen-stat span {
      color: rgba(255,255,255,0.56);
      font-size: 12px;
      font-weight: 650;
    }

    .section {
      width: min(var(--max), calc(100% - 36px));
      margin: 0 auto;
      padding: 94px 0;
    }

    .section-head {
      display: grid;
      grid-template-columns: 1fr 0.62fr;
      gap: 42px;
      align-items: end;
      margin-bottom: 36px;
    }

    .kicker {
      color: var(--blue);
      font-size: 13px;
      font-weight: 780;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(40px, 6vw, 78px);
      line-height: 0.96;
      letter-spacing: -0.07em;
      font-weight: 820;
    }

    .section-copy {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.42;
      letter-spacing: -0.03em;
      font-weight: 520;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .service-card {
      min-height: 360px;
      border-radius: var(--radius-lg);
      background: var(--white);
      border: 1px solid rgba(255, 255, 255, 0.85);
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      position: relative;
    }

    .service-card::before {
      content: "";
      position: absolute;
      inset: -120px -120px auto auto;
      width: 250px;
      height: 250px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0, 113, 227, 0.13), rgba(0, 113, 227, 0));
    }

    .service-card:nth-child(2)::before {
      background: radial-gradient(circle, rgba(142, 109, 248, 0.15), rgba(142, 109, 248, 0));
    }

    .service-card:nth-child(3)::before {
      background: radial-gradient(circle, rgba(103, 214, 179, 0.18), rgba(103, 214, 179, 0));
    }

    .service-icon {
      position: relative;
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 24px;
      background: #f5f5f7;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
      margin-bottom: 24px;
    }

    .service-card h3 {
      position: relative;
      font-size: 31px;
      line-height: 1.02;
      letter-spacing: -0.055em;
      margin-bottom: 13px;
    }

    .service-card p {
      position: relative;
      color: var(--muted);
      font-size: 16px;
      letter-spacing: -0.025em;
    }

    .service-link {
      position: relative;
      margin-top: 28px;
      color: var(--blue);
      font-weight: 720;
      font-size: 15px;
    }

    .feature-band {
      padding: 24px;
      border-radius: 48px;
      background: #101014;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .feature-band::before {
      content: "";
      position: absolute;
      width: 620px;
      height: 620px;
      right: -140px;
      top: -220px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0, 113, 227, 0.34), rgba(142, 109, 248, 0.18) 42%, rgba(16, 16, 20, 0) 72%);
    }

    .feature-inner {
      position: relative;
      z-index: 1;
      min-height: 610px;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 24px;
      align-items: stretch;
      color: #ffffff;
    }

    .feature-copy {
      padding: clamp(30px, 5vw, 58px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .feature-copy .kicker {
      color: #8fd8ff;
    }

    .feature-copy h2 {
      font-size: clamp(40px, 6vw, 82px);
      line-height: 0.91;
      letter-spacing: -0.075em;
      margin-bottom: 24px;
      font-weight: 820;
    }

    .feature-copy p {
      color: rgba(255, 255, 255, 0.68);
      font-size: 18px;
      line-height: 1.42;
      letter-spacing: -0.03em;
      max-width: 520px;
      margin-bottom: 30px;
    }

    .feature-list {
      display: grid;
      gap: 12px;
    }

    .feature-point {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.86);
      font-weight: 660;
    }

    .feature-point span {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      display: grid;
      place-items: center;
      color: #8fd8ff;
    }

    .image-card {
      position: relative;
      border-radius: 34px;
      overflow: hidden;
      align-self: stretch;
      min-height: 520px;
      background: #222;
    }

    .image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.9;
    }

    .image-overlay {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 22px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 22px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .image-overlay strong {
      display: block;
      font-size: 24px;
      letter-spacing: -0.045em;
      margin-bottom: 6px;
    }

    .image-overlay p {
      color: rgba(255, 255, 255, 0.72);
      font-size: 15px;
    }

    .process-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .process-card {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: var(--radius-lg);
      padding: 25px;
      min-height: 250px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .process-number {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: #101014;
      color: #ffffff;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 780;
      margin-bottom: 26px;
    }

    .process-card h3 {
      font-size: 23px;
      line-height: 1.06;
      letter-spacing: -0.05em;
      margin-bottom: 11px;
    }

    .process-card p {
      color: var(--muted);
      font-size: 15px;
      letter-spacing: -0.025em;
    }

    .pricing-wrap {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 20px;
      align-items: stretch;
    }

    .pricing-intro {
      border-radius: var(--radius-xl);
      padding: clamp(30px, 4vw, 46px);
      background: linear-gradient(145deg, #ffffff, #ececf2);
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 520px;
    }

    .pricing-intro h2 {
      font-size: clamp(38px, 5vw, 68px);
      line-height: 0.94;
      letter-spacing: -0.07em;
      margin-bottom: 20px;
    }

    .pricing-intro p {
      color: var(--muted);
      font-size: 18px;
      letter-spacing: -0.03em;
      max-width: 440px;
    }

    .price-note {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .package-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .package-card {
      border
